# Clinical trials — evaluate therapies in conditions.
# Schema: schema/trial.schema.json   |   See schema/DATA_DICTIONARY.md
# id prefix: trial-
# Every `therapies` and `conditions` id must resolve (build:data enforces this).
# NOTE: nctId is included only where verified. Where omitted, `references` carries
# a ClinicalTrials.gov search link; the refresh routine should fill verified NCT ids.

# ============================ LAA CLOSURE =================================
- id: trial-protect-af
  type: trial
  name: "PROTECT AF"
  phase: "Pivotal RCT"
  status: completed
  conditions: [cond-af]
  therapies: [dev-watchman-flx]
  enrollment: 707
  year: 2014
  primaryEndpoint: "Composite of stroke, cardiovascular death, and systemic embolism"
  outcomeSummary: "Watchman was noninferior (and superior on the long-term composite) to warfarin in non-valvular AF."
  resultStatus: positive
  references: ["https://clinicaltrials.gov/search?term=PROTECT-AF+Watchman"]
  curation: { status: curated, lastUpdated: 2026-06-22 }

- id: trial-prevail
  type: trial
  name: "PREVAIL"
  phase: "Pivotal RCT"
  status: completed
  conditions: [cond-af]
  therapies: [dev-watchman-flx]
  enrollment: 407
  year: 2014
  primaryEndpoint: "Efficacy and safety vs warfarin"
  outcomeSummary: "Co-primary endpoints only partially met, but data supported approval alongside PROTECT AF."
  resultStatus: mixed
  references: ["https://clinicaltrials.gov/search?term=PREVAIL+Watchman"]
  curation: { status: curated, lastUpdated: 2026-06-22 }

- id: trial-prague-17
  type: trial
  name: "PRAGUE-17"
  phase: "RCT (LAAC vs DOAC)"
  status: completed
  conditions: [cond-af]
  therapies: [dev-watchman-flx, dev-amulet]
  enrollment: 402
  year: 2020
  primaryEndpoint: "Composite of cardiovascular, neurological, and bleeding events"
  outcomeSummary: "LAA closure was noninferior to DOACs in high-risk AF patients."
  resultStatus: positive
  references: ["https://clinicaltrials.gov/search?term=PRAGUE-17"]
  curation: { status: curated, lastUpdated: 2026-06-22 }

- id: trial-amulet-ide
  type: trial
  name: "Amulet IDE"
  phase: "RCT (head-to-head)"
  status: completed
  conditions: [cond-af]
  therapies: [dev-amulet, dev-watchman-flx]
  enrollment: 1878
  year: 2021
  primaryEndpoint: "Safety, effective LAA occlusion, and stroke/systemic embolism"
  outcomeSummary: "Amulet was noninferior to Watchman; more peri-procedural complications but superior LAA closure."
  resultStatus: positive
  references: ["https://clinicaltrials.gov/search?term=Amulet+IDE"]
  curation: { status: curated, lastUpdated: 2026-06-22 }

- id: trial-option
  type: trial
  name: "OPTION"
  phase: "RCT (LAAC vs DOAC post-ablation)"
  status: completed
  conditions: [cond-af]
  therapies: [dev-watchman-flx]
  enrollment: 1600
  year: 2025
  primaryEndpoint: "Stroke/death and non-procedural bleeding after AF ablation"
  outcomeSummary: "LAA closure was noninferior for ischemic events with less non-procedural bleeding than DOAC after ablation."
  resultStatus: positive
  references: ["https://clinicaltrials.gov/search?term=OPTION+Watchman"]
  curation: { status: curated, lastUpdated: 2026-06-22 }

- id: trial-champion-af
  type: trial
  name: "CHAMPION-AF"
  phase: "RCT (LAAC vs DOAC)"
  status: active
  conditions: [cond-af]
  therapies: [dev-watchman-flx]
  enrollment: 3000
  primaryEndpoint: "Stroke/systemic embolism and bleeding vs first-line DOAC"
  outcomeSummary: "Large RCT testing first-line LAA closure vs DOAC in a broad AF population; results pending."
  resultStatus: ongoing
  references: ["https://clinicaltrials.gov/search?term=CHAMPION-AF"]
  curation: { status: curated, lastUpdated: 2026-06-22, notes: "Confirm enrollment and readout date at refresh." }

